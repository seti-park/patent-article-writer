# Stage contract: archive (ARCH-03, PKG-01)
# Orchestrator assembles essays/<id>/ shelf + runs/<id>/ evidence.
# id ≡ run_id (glossary): <assignee>-<publication-number> lowercased; -rN on re-run.

id: archive
# orchestrator-inline; no skill/agent
writes:
  - essays/<id>/
  - runs/<id>/

# id rule: contracts/glossary.md run_id; essay_id ≡ run_id from run-manifest.

may_read:
  - handoff/**
  - input/patent.md
  - input/figures/**
  - handoff/run-manifest.md

required_outputs:
  - essays/<id>/essay-final.md
  - essays/<id>/owner-briefing.md
  - essays/<id>/owner-study-pack.md
  - essays/<id>/patent.md              # snapshot; sha256 must match run-manifest
  - essays/<id>/figures/               # placed selected/cleaned figures
  - essays/<id>/publication-package/publication.md
  - essays/<id>/publication-package/posting-checklist.md
  - essays/<id>/publication-package/cover-5x2.png
  - essays/<id>/score-history.md
  - essays/<id>/gate-result.json       # or last gate-result.round-N
  - essays/<id>/README.md
  # promo/ is added later by promo stage (empty or absent at archive time OK)
  - essays/<id>/promo/                 # optional at archive; promo stage fills
  # MIGRATION EXCEPTION: full handoff tree allowed under essays/<id>/handoff/
  # until slim-archive lands. SUNSET: remove when slim-archive contract is
  # added; every new run after that date must not copy the full tree.
  - essays/<id>/handoff/               # migration; see sunset above
  - runs/<id>/                         # full round evidence

assembly:  # deterministic parts — archive stage responsibility
  - copy essay-final.md from handoff/03-edit/
  - copy owner-briefing.md + owner-study-pack.md from 00-understand/
  - snapshot input/patent.md (hash-match run-manifest patent_sha256)
  - place figures into essays/<id>/figures/ and publication-package/
  - copy publication.md → publication-package/publication.md
  - author publication-package/posting-checklist.md
  - copy score-history + gate-result + README
  - "cover step (required): invoke tools/make_header.py → essays/<id>/publication-package/cover-5x2.png (tools/header-style.md; make_header.py is contracted cover producer; mascot/investor variants optional)"

rules:
  - "Cover generation is an explicit archive step, not optional on publish."
  - "patent.md snapshot must hash-match handoff/run-manifest.md patent_sha256."
  - "Full handoff copy is migration-only; sunset when slim-archive lands."
