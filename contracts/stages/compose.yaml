# Stage contract: compose
# Draft from design handoff only. Never raw patent (invariant 3).

id: compose
skill: essay-en-composer
agent: essay-composer
handoff: handoff/02-compose/

may_read:
  - handoff/01-design/**
  - handoff/00-understand/**           # Quotable spans / frozen model only
  - handoff/00-understand/comprehension-notes.md  # explanation priors (framing/emphasis), NOT a fact source
  - input/figures/**
  - handoff-template/02-compose/**
  - .claude/skills/essay-en-composer/**
  - .claude/skills/voice-canon-lookup/**
  - .claude/skills/_shared/references/deliverable-voice-rules.md
  - .claude/skills/_shared/references/anti-ai-writing.md
  - .claude/skills/_shared/references/caption-roles.md
  - .claude/skills/_shared/references/reader-profile.md
  - .claude/skills/_shared/references/reader-energy.md
  - .claude/skills/_shared/references/working-dialogue-voice.md
  # revision mode also reads:
  - handoff/03-edit/edit-log.round-*.md
  - handoff/03-edit/gate-result.round-*.json

must_not_read:
  - input/patent.md                    # invariant 3 — Quotable spans only
  - .claude/skills/editorial-review/** # no review self-grading

required_outputs:
  - handoff/02-compose/essay-draft.md
  - handoff/02-compose/figures-rationale.md  # compose: how figures are used in prose (≠ design figure-rationale.md)
  - handoff/02-compose/thesis-trace.md
  - handoff/02-compose/publication.md

# Revision mode (orchestrator-invoked): dispositions every medium+ finding →
# handoff/02-compose/revision-response.round-N.md (composer-owned; check_run path).

rules:
  - "Inside pipeline: strict-execution only; gap-stops raise OWNER_QUESTION."
  - "Fact introduction beyond invention-summary Quotable spans + fact-check-log external facts is forbidden."
  - "thesis-trace.md declares <=3 signature lines (or explicit none)."

# Multi-vendor compose lane (docs/architecture/multi-vendor-lanes.md §8 P2)
# Owner-confirmed 2026-07-11: round cap N=3 before inherit fallback (§10-3);
# default grok (§10-1) — flipped only after all lanes were proven default-off
# (live runs + fallback burns + regression PASS). No grok CLI ⇒ guardrail 4
# degrades to inherit and the run report records the substitution.
compose_vendor:
  flag: "--compose-vendor"
  values: [inherit, grok]
  default: grok
  grok:
    lane: "_shared/scripts/cli_lane.py --vendor grok  (grok --prompt-file, -m grok-4.5, tool-less, constrained --json-schema document envelope)"
    prompt_template: .claude/skills/patent-essay/references/compose-lane-grok.md
    isolation: "tool-less grok (--tools '' --no-subagents --disable-web-search; single-shot generation) + prompt INLINES design handoff + voice refs; input/patent.md never in the prompt (invariant 3); gate_patent_leak stays the vendor-agnostic net"
    voice_pregate: "cheap fresh Claude fork before each full review round on a grok draft; VOICE-FAIL => one grok re-drive with the tells, second FAIL => inherit re-compose (guardrail 2)"
    round_cap: "after 3 grok revision rounds without acceptance, remaining rounds compose with inherit (guardrail 3); lane switch recorded"
    fallback: "cli_lane exit 3 => compose with inherit as today; the run report MUST record the substitution (never silent)"
