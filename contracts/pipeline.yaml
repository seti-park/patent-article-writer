# Patent Essay Pipeline — stage graph and profiles
# Source of truth for what runs. Orchestrator interprets this; CLAUDE.md only summarizes.
# The per-profile `stages:` list is the ONLY execution list. Flags below it are derived
# summaries; on any disagreement `stages:` wins.
# owner_confirm domain: hard | soft | false

name: patent-article-writer
version: 2

stages:
  - id: bootstrap
    # orchestrator-inline; procedure: patent-essay SKILL.md "Run bootstrap"

  - id: figures
    skill: patent-figures-clean
    agent: figures-prep
    optional: true   # skip if input/figures/ has fig-*.png that survived bootstrap
                     # step 4 (identity-checked against the current patent)

  - id: understand
    skill: patent-understand
    agent: patent-reader
    required: true
    human_checkpoint: understand_confirm   # procedure: patent-essay SKILL.md "Owner checkpoint protocol"

  - id: design
    skill: thesis-architect
    agent: design-architect
    requires: [understand]

  - id: compose
    skill: essay-en-composer
    agent: essay-composer
    requires: [design]

  - id: review_loop
    skill: editorial-review
    agent: editorial-reviewer
    requires: [compose]
    # acceptance policy set by profile

  - id: self_audit
    # cold reader = one extra adversarial-reader fork, checklist-FREE (see stages/self_audit.yaml)
    agents: [adversarial-reader, grounding-verifier]
    requires: [review_loop]

  - id: polish
    skill: prose-polish
    agent: prose-polish
    requires: [self_audit]

  - id: verify
    scripts:
      - .claude/skills/_shared/scripts/check_run.py
      - .claude/skills/_shared/scripts/run_gates.py

  - id: archive
    writes: [essays/<id>/, runs/<id>/]

  - id: promo
    skill: promo-composer
    agent: promo-composer
    requires: [archive]

  - id: retro
    skill: pipeline-retro
    requires: [archive]

profiles:
  understand-only:
    description: Freeze patent triad for Owner study; no angle, no essay.
    stages: [bootstrap, figures, understand]
    owner_confirm: hard
    self_audit: false
    polish: false
    promo: false
    retro: false

  draft:
    description: Fast exploration; single-clean; no audit/polish/promo.
    stages: [bootstrap, figures, understand, design, compose, review_loop, verify]
    review_loop:
      acceptance: single_clean
      max_revision: 2
    owner_confirm: soft    # surface study pack; may continue
    self_audit: false
    polish: false
    promo: false
    retro: false

  wire:
    description: Wire/short mode; self-audit off; retro on (it archives).
    stages: [bootstrap, figures, understand, design, compose, review_loop, verify, archive, retro]
    review_loop:
      acceptance: single_clean
      max_revision: 3
    owner_confirm: soft
    self_audit: false
    polish: false
    promo: false
    retro: true    # retro requires archive; wire archives — the stages-list omission was the bug
    mode: wire

  publish:
    description: Default essay path — full quality graph.
    stages:
      - bootstrap
      - figures
      - understand
      - design
      - compose
      - review_loop
      - self_audit
      - polish
      - verify
      - archive
      - promo
      - retro
    review_loop:
      acceptance: double_clean
      max_revision: 4
    owner_confirm: hard
    self_audit: true
    polish: true
    promo: true
    retro: true
    mode: essay

  promo-only:
    description: Rebuild promo pack from an existing essays/<id>/ archive.
    stages: [promo]
    owner_confirm: false

defaults:
  profile: publish
  threshold: pass
  # --yes skips owner_confirm hard/soft stops
